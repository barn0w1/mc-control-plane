[control_plane]
database = "/var/lib/mc-control-plane/control-plane.db"
system_id = "mc-control-plane"
control_plane_url = "https://mc-control-plane.hss-science.org"
host_bootstrap_key = "/etc/mc-control-plane/host-bootstrap.key"
agent_wheel = "/opt/mc-control-plane/artifacts/host-agent.whl"
fixture_image = "docker.io/library/alpine@sha256:REPLACE_WITH_PINNED_DIGEST"
ssh_public_keys = ["/etc/mc-control-plane/akamai_ed25519.pub"]
interval_seconds = 5.0
operation_limit = 32

[host_api]
bind = "127.0.0.1"
port = 8443

[r2]
account_id = "REPLACE_WITH_R2_ACCOUNT_ID"
bucket = "mccp-data"
parent_access_key_id = "REPLACE_WITH_R2_PARENT_ACCESS_KEY_ID"
cloudflare_api_token_file = "/etc/mc-control-plane/cloudflare-api-token"
lease_ttl_seconds = 3600
